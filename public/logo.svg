<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#111110"/>
  
  <!-- Outer glow ring -->
  <rect x="2" y="2" width="60" height="60" rx="12" stroke="#2a2a29" stroke-width="1"/>
  
  <!-- Code bracket left with AI sparkle -->
  <path d="M20 24L14 32L20 40" stroke="#f5f5f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Code bracket right -->
  <path d="M44 24L50 32L44 40" stroke="#f5f5f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center slash representing coding/terminal -->
  <path d="M28 44L36 20" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  
  <!-- AI sparkle dots -->
  <circle cx="32" cy="14" r="2" fill="#6366f1"/>
  <circle cx="32" cy="50" r="2" fill="#6366f1"/>
</svg>