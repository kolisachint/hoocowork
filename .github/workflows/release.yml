name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: 'Version bump: patch, minor, major'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: git config
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: bun test

      - name: Bump version
        run: |
          NEW_VERSION=$(bun x semver -i ${{ inputs.increment }} $(node -p "require('./package.json').version"))
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          node -e "const p=require('./package.json'); p.version='$NEW_VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Generate changelog
        run: |
          bun x conventional-changelog-cli -p conventionalcommits -i CHANGELOG.md -s

      - name: Commit and tag
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore(release): v${{ env.NEW_VERSION }}"
          git tag v${{ env.NEW_VERSION }}
          git push origin main --tags

      - name: Create GitHub Release
        run: |
          gh release create v${{ env.NEW_VERSION }} \
            --title "HooCowork v${{ env.NEW_VERSION }}" \
            --notes-file <(bun x conventional-changelog-cli -p conventionalcommits -r 2 | tail -n +5) \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-binaries:
    needs: release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary-suffix: linux-x64
          - os: ubuntu-latest
            binary-suffix: linux-arm64
          - os: windows-latest
            binary-suffix: win-x64.exe
          - os: macos-latest
            binary-suffix: darwin-x64
          - os: macos-latest
            binary-suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: bun run build

      - run: bun run scripts/embed-assets.ts

      - name: Build binary
        shell: bash
        run: |
          BINARY_NAME="hoocowork-${{ matrix.binary-suffix }}"
          BUN_ARGS=""
          if [[ "${{ matrix.binary-suffix }}" == "win-x64.exe" ]]; then
            BUN_ARGS="--target=bun-windows-x64 --windows-hide-console"
          elif [[ "${{ matrix.binary-suffix }}" == "linux-arm64" ]]; then
            BUN_ARGS="--target=bun-linux-arm64"
          fi
          bun build --compile server/binary-entry.ts --outfile="$BINARY_NAME" $BUN_ARGS

      - uses: actions/upload-artifact@v4
        with:
          name: hoocowork-${{ matrix.binary-suffix }}
          path: hoocowork-${{ matrix.binary-suffix }}
          if-no-files-found: error

  upload-binaries:
    needs: [release, release-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: hoocowork-*
          path: ./binaries
          merge-multiple: true

      - name: Upload binaries to release
        run: |
          TAG=v$(node -p "require('./package.json').version")
          for binary in ./binaries/*; do
            echo "Uploading $binary to $TAG"
            gh release upload "$TAG" "$binary" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
